<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fish Tap Game</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(to bottom, #00c6ff, #0072ff);
    color: white;
    text-align: center;
}

h1 {
    margin-top: 10px;
}

#info {
    display: flex;
    justify-content: space-around;
    font-size: 18px;
}

/* Fish */
.fish {
    position: absolute;
    width: 60px;
    cursor: pointer;
    transition: 0.2s;
}

.fish:active {
    transform: scale(0.8);
}
</style>
</head>

<body>

<h1>🐟 Fish Tap Game</h1>

<div id="info">
    <div>💰 Coins: <span id="score">0</span></div>
    <div>⏱ Time: <span id="time">30</span>s</div>
</div>

<script>
let score = 0;
let time = 30;
let misses = 0;

/* Timer */
let gameTimer = setInterval(() => {
    time--;
    document.getElementById("time").innerText = time;

    if (time <= 0) {
        endGame();
    }
}, 1000);

/* Spawn fish */
function spawnFish() {
    let fish = document.createElement("img");
    fish.src = "https://cdn-icons-png.flaticon.com/512/616/616408.png";
    fish.className = "fish";

    fish.style.top = Math.random() * (window.innerHeight - 100) + "px";
    fish.style.left = Math.random() * (window.innerWidth - 100) + "px";

    /* Tap fish */
    fish.onclick = () => {
        score++;
        document.getElementById("score").innerText = score;
        fish.remove();
    };

    document.body.appendChild(fish);

    /* If not tapped */
    setTimeout(() => {
        if (document.body.contains(fish)) {
            fish.remove();
            misses++;
            if (misses >= 3) {
                endGame();
            }
        }
    }, 1500);
}

/* Spawn every second */
setInterval(spawnFish, 1000);

/* End game */
function endGame() {
    clearInterval(gameTimer);
    alert("Game Over! Coins: " + score);
    location.reload();
}
</script>

</body>

    transform:scale(0.9);
}

.glow{
    animation: glow 0.2s ease;
}

    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

<body>

<div class="game">
    <h1>🔥 Tap Rush</h1>

    <div class="scoreboard">
        <div>Score: <span id="score">0</span></div>
        <div>Time: <span id="time">30</span>s</div>
    </div>

    <button id="tapBtn">TAP 💥</button>

    <br>
    <button class="start" onclick="startGame()">Start Game</button>

    <p>🏆 High Score: <span id="highScore">0</span></p>
</div>

<script>
let score = 0;
let time = 30;
let gameRunning = false;
let interval;

// load high score
let highScore = localStorage.getItem("highScore") || 0;
document.getElementById("highScore").innerText = highScore;

// tap
document.getElementById("tapBtn").addEventListener("click", ()=>{
    if(!gameRunning) return;

    score++;
    document.getElementById("score").innerText = score;

    let btn = document.getElementById("tapBtn");
    btn.classList.add("glow");
    setTimeout(()=>btn.classList.remove("glow"),200);
});

// start game
function startGame(){
    score = 0;
    time = 30;
    gameRunning = true;

    document.getElementById("score").innerText = score;
    document.getElementById("time").innerText = time;

    clearInterval(interval);

    interval = setInterval(()=>{
        time--;
        document.getElementById("time").innerText = time;

        if(time <= 0){
            clearInterval(interval);
            gameRunning = false;

            alert("Game Over! Score: " + score);

            if(score > highScore){
                highScore = score;
                localStorage.setItem("highScore", highScore);
                document.getElementById("highScore").innerText = highScore;
            }
        }
    },1000);
}
</script>

</body>
