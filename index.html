here<!DOCTYPE html>
<html>
<head>
    <title>TapRush Game</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #111;
            color: white;
        }
        button {
            padding: 20px;
            font-size: 20px;
            background: green;
            color: white;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>TapRush Game 🎮</h1>
<p>Score: <span id="score">0</span></p>

<button onclick="tap()">TAP ME</button>

<script>
let score = 0;

function tap() {
    score++;
    document.getElementById("score").innerText = score;
}
</script>

</body>
</html>
